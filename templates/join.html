<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex items-center justify-center px-4">

<div class="bg-white/10 p-6 sm:p-10 rounded-2xl w-full max-w-md text-center">

  <h2 class="mb-4 text-2xl">Enter Team Name</h2>

  <input id="team" class="p-3 text-black mb-4 rounded">

  <br>

  <button onclick="go()" class="bg-blue-600 px-6 py-2 rounded">
    Enter
  </button>

</div>

<script>
function go(){
  const t=document.getElementById('team').value;
  if(!t) return alert("Enter name");
  window.location.href=`/buzzer?team=${encodeURIComponent(t)}`;
}
</script>
</body>
</html>
