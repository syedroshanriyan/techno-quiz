<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center h-screen">

<h2 class="mb-4">Team: {{ team }}</h2>

<h1 id="status" class="text-4xl mb-6">LOCKED</h1>

<button id="btn"
class="bg-gray-600 rounded-full flex items-center justify-center
       text-white font-bold
       w-[60vw] h-[60vw]
       max-w-[300px] max-h-[300px]
       text-3xl sm:text-5xl
       transition active:scale-90">
  BUZZ
</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script>
const socket = io({
  transports: ["polling", "websocket"]
});

const team = "{{ team }}";
let enabled = false;

// ✅ REGISTER AFTER CONNECT (CRITICAL)
socket.on("connect", () => {
  console.log("CONNECTED:", socket.id);
  socket.emit("register", { team });
});

// ✅ RECEIVE LOCK/UNLOCK STATE
socket.on("buzzer_state", (state) => {
  enabled = state;
});

// 🔴 FIXED BUZZ FUNCTION
function buzz() {
  console.log("BUTTON CLICKED");

  if (!enabled) {
    console.log("IGNORED - LOCKED");
    return;
  }

  console.log("SENDING BUZZ");

  socket.emit("buzz");
}
</script>
</body>
</html>
