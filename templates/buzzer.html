<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white flex flex-col items-center justify-center h-screen">

<h2 class="mb-4">Team: {{ team }}</h2>

<h1 id="status" class="text-4xl mb-6">LOCKED</h1>

<button id="btn" onclick="buzz()" class="w-40 h-40 rounded-full bg-gray-600 text-2xl">
  BUZZ
</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script> ✅
<script>
const socket = io({
  transports: ["polling", "websocket"]
});

const team = "{{ team }}";
let enabled = false;

socket.emit("register", {team});

socket.on("buzzer_state", s=>{
  enabled = s;
});

function buzz(){
  if(!enabled) return;
  socket.emit("buzz");
}
</script>
</body>
</html>
