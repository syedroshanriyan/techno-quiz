<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white p-10">

<h1 class="text-3xl mb-6">Admin Panel</h1>

<div class="grid grid-cols-2 gap-6">

<div class="bg-white/10 p-4 rounded">
<h3>Teams</h3>
<div id="teams"></div>
</div>

<div class="bg-white/10 p-4 rounded">

<h3>Status: <span id="state">LOCKED</span></h3>

<button onclick="toggle()" id="toggleBtn"
  class="mt-4 w-full bg-green-600 p-3 rounded">
  UNLOCK
</button>

<button onclick="reset()" class="mt-4 w-full bg-yellow-500 p-3 rounded">
  RESET
</button>

<a href="/board">
<button class="mt-4 w-full bg-purple-600 p-3 rounded">
  VIEW BOARD
</button>
</a>

</div>

</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script> ✅
<script>
const socket = io({
  transports: ["polling", "websocket"]
});

socket.on("connect", () => {
  console.log("CONNECTED", socket.id);
});

socket.on("team_list", (teams) => {
  const box = document.getElementById("teams");

  if (!teams.length) {
    box.innerHTML = "No teams yet";
    return;
  }

  box.innerHTML = teams.map((t,i)=>`${i+1}. ${t}`).join("<br>");
});

socket.on("buzzer_state", (state) => {
  const st = document.getElementById("state");
  const btn = document.getElementById("toggleBtn");

  if(state){
    st.innerText="UNLOCKED";
    btn.innerText="LOCK";
  }else{
    st.innerText="LOCKED";
    btn.innerText="UNLOCK";
  }
});

function toggle(){
  socket.emit("toggle");
}

function reset(){
  socket.emit("reset");
}
</script>
</body>
</html>
