<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white text-center p-10">

<h1 class="text-4xl sm:text-6xl mb-6">Results</h1>

<div id="list" class="text-2xl sm:text-4xl space-y-2"></div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
const socket = io({
  transports: ["polling", "websocket"]
});

socket.on("update", (data) => {
  const list = document.getElementById("list");

  if (!data || data.length === 0) {
    list.innerHTML = "No buzz yet";
    return;
  }

  list.innerHTML = data.map(x => x.team).join("<br>");
});
</script>

</body>
</html>
